}

function drawVillageVisualization(houses) {
  _clearVillageLayers();
  const stats = computeVillageStats(houses);
  const improved = _villageState.eastImproved;

  // ── ELECTRICITY ZONES ──
  const zonesGroup = L.featureGroup();

  // East zone (low = red, or green if improved)
  const eCol  = improved ? C.green : C.red;
  const ePos  = stats.east.centroid;
  const eCir  = L.circle(ePos, { radius:380, color:eCol, fillColor:eCol, weight:2, opacity:.65, fillOpacity:.15 });
  const eLbl  = L.marker(ePos, {
    icon: L.divIcon({
      html: `<div class="vz-label" style="border-color:${eCol}">
        <strong style="color:${eCol}">${improved ? '✓ Adequate' : '⚠ Low Electricity'}</strong><br>
        ${stats.east.pct}% coverage · ${stats.east.withElec}/${stats.east.count} HH
      </div>`,
      iconSize: [160, 38], iconAnchor: [80, 38], className: ''
    })
  });
  eCir.on('click',  e => { L.DomEvent.stopPropagation(e); showElecZoneDetail('east', stats); });
  eLbl.on('click',  e => { L.DomEvent.stopPropagation(e); showElecZoneDetail('east', stats); });
  eCir.bindTooltip(improved ? 'East Zone — Electricity Adequate' : 'East Zone — Low Electricity\nClick for details', { sticky:true });
  zonesGroup.addLayer(eCir);
  zonesGroup.addLayer(eLbl);

  // West zone (high = green)
  const wPos  = stats.west.centroid;
  const wCir  = L.circle(wPos, { radius:380, color:C.green, fillColor:C.green, weight:2, opacity:.65, fillOpacity:.15 });
  const wLbl  = L.marker(wPos, {
    icon: L.divIcon({
      html: `<div class="vz-label" style="border-color:${C.green}">
        <strong style="color:${C.green}">✓ High Electricity</strong><br>
        ${stats.west.pct}% coverage · ${stats.west.withElec}/${stats.west.count} HH
      </div>`,
      iconSize: [160, 38], iconAnchor: [80, 38], className: ''
    })
  });
  wCir.on('click', e => { L.DomEvent.stopPropagation(e); showElecZoneDetail('west', stats); });
  wLbl.on('click', e => { L.DomEvent.stopPropagation(e); showElecZoneDetail('west', stats); });
  wCir.bindTooltip('West Zone — High Electricity', { sticky:true });
  zonesGroup.addLayer(wCir);
  zonesGroup.addLayer(wLbl);

  // ── APL / BPL HOUSEHOLD DOTS inside zone circles ──
  // APL → blue (#3888e0), BPL → orange (#e08830)
  // Color reflects poverty category, not electricity zone.
  const _hhNames = ['Ramesh K.','Sunita D.','Vijay M.','Anita P.','Suresh B.','Kavita N.','Mohan R.','Priya S.','Arjun T.','Lakshmi V.','Ganesh H.','Meera J.','Ravi C.','Sonal A.','Dinesh W.','Usha F.','Prakash G.','Nanda L.','Yogesh E.','Tara O.'];
  const _hhOccup = ['Farmer','Daily Labourer','Teacher','Shop Owner','Tailor','Driver','Carpenter','Weaver','Nurse','Mechanic'];

  function _randomDotsInCircle(centre, radiusM, count, elecLabel, group) {
    const centreLat = centre[0];
    const centreLng = centre[1];
    const dLat = radiusM / 111320;
    const dLng = radiusM / (111320 * Math.cos(centreLat * Math.PI / 180));

    let placed = 0, attempts = 0;
    const maxAttempts = count * 10;

    while (placed < count && attempts < maxAttempts) {
      attempts++;
      const candidateLat = centreLat + (Math.random() * 2 - 1) * dLat;
      const candidateLng = centreLng + (Math.random() * 2 - 1) * dLng;

      if (lmap.distance(L.latLng(candidateLat, candidateLng), L.latLng(centre)) > radiusM) continue;

      const dist = lmap.distance(L.latLng(candidateLat, candidateLng), L.latLng(centre));
      if (dist > radiusM * 0.82 && Math.random() < 0.45) continue;

      // ~42% BPL (matches seed data ratio)
      const isBPL   = Math.random() < 0.42;
      const dotColor = isBPL ? C.orange : C.blue;   // BPL=orange, APL=blue
      const catLabel = isBPL ? 'BPL' : 'APL';
      const catStyle = isBPL ? `color:${C.orange};font-weight:700` : `color:${C.blue};font-weight:700`;

      const houseId = `HH-${Math.floor(1000 + Math.random() * 9000)}`;
      const name    = _hhNames[placed % _hhNames.length];
      const members = 3 + Math.floor(Math.random() * 5);
      const occup   = _hhOccup[Math.floor(Math.random() * _hhOccup.length)];
      const elecIcon = elecLabel === 'Low' ? '🔴' : '🟢';

      const dot = L.circleMarker([candidateLat, candidateLng], {
        radius:      4,
        fillColor:   dotColor,
        fillOpacity: 0.7,
        stroke:      false
      });

      dot.bindPopup(
        `<div style="font-family:var(--font-mono,monospace);font-size:11px;min-width:165px;line-height:1.8">
          <div style="font-weight:700;font-size:12px;margin-bottom:4px">${houseId}</div>
          <div>📋 Category: <span style="${catStyle}">${catLabel}</span></div>
          <div>${elecIcon} Electricity: <strong>${elecLabel}</strong></div>
          <div>👤 Head: ${name}</div>
          <div>👨‍👩‍👧 Members: ${members}</div>
          <div>💼 ${occup}</div>
        </div>`,
        { maxWidth: 210, className: 'hh-popup' }
      );

      dot.on('mouseover', function() { this.setStyle({ fillOpacity: 1, radius: 6 }); });
      dot.on('mouseout',  function() { this.setStyle({ fillOpacity: 0.7, radius: 4 }); });

      group.addLayer(dot);
      placed++;
    }
  }

  const ZONE_R    = 380;
  const DOT_COUNT = 30;

  _randomDotsInCircle(ePos, ZONE_R, DOT_COUNT, improved ? 'High' : 'Low', zonesGroup);
  _randomDotsInCircle(wPos, ZONE_R, DOT_COUNT, 'High', zonesGroup);

  _villageLayers.zones = zonesGroup;
  villageLayer.addLayer(zonesGroup);

  // ── ROADS — realistic casing technique ──
  // Each road = 2 overlapping polylines: wide dark border (casing) + narrow fill
  // Paved: dark gray border + light gray fill (looks like concrete/asphalt)
  // Unpaved: dark brown border + tan fill with dashes (looks like dirt track)
  const roadsGroup = L.featureGroup();

  _villageRoads().forEach(road => {
    const isPaved = road.type === 'paved';
    const popup = `<div class="ph">
      <div class="ph-n">${road.name}</div>
      <div class="ph-a">${isPaved ? '🛣️ Paved Road — Concrete/Asphalt' : '🟤 Unpaved Track — Dirt/Gravel'}</div>
    </div>`;

    if (isPaved) {
      // Casing (border) — slightly wider, dark
      const casing = L.polyline(road.path, {
        color: '#4a5060', weight: 7, opacity: 0.85,
        lineCap: 'round', lineJoin: 'round'
      });
      // Fill — narrower, light warm gray (asphalt tone)
      const fill = L.polyline(road.path, {
        color: '#d4cfc8', weight: 4, opacity: 0.95,
        lineCap: 'round', lineJoin: 'round'
      });
      fill.bindPopup(popup);
      roadsGroup.addLayer(casing);
      roadsGroup.addLayer(fill);
    } else {
      // Casing — dark brown
      const casing = L.polyline(road.path, {
        color: '#6b4c28', weight: 5, opacity: 0.7,
        lineCap: 'round', lineJoin: 'round', dashArray: '10 7'
      });
      // Fill — tan/dirt color, dashed
      const fill = L.polyline(road.path, {
        color: '#c8a46a', weight: 2.5, opacity: 0.9,
        lineCap: 'round', lineJoin: 'round', dashArray: '10 7'
      });
      fill.bindPopup(popup);
      roadsGroup.addLayer(casing);
      roadsGroup.addLayer(fill);
    }
  });

  _villageLayers.roads = roadsGroup;
  villageLayer.addLayer(roadsGroup);

  // ── FACILITIES ──
  const facGroup = L.featureGroup();
  const fac = _villageFacilities();
  fac.schools.forEach(s => {
    const m = L.marker([s.lat, s.lng], {
      icon: L.divIcon({
        html: `<div class="fac-marker" style="background:#1a3a6a;border:1.5px solid ${C.blue}" title="${s.name}">📚</div>`,
        iconSize:[28,28], iconAnchor:[14,14], className:''
      })
    });
    m.bindPopup(`<div class="ph"><div class="ph-n">${s.name}</div><div class="ph-a">🏫 School</div></div>`);
    m.on('click', e => L.DomEvent.stopPropagation(e));
    facGroup.addLayer(m);
  });
  fac.hospitals.forEach(h => {
    const m = L.marker([h.lat, h.lng], {
      icon: L.divIcon({
        html: `<div class="fac-marker" style="background:#3a0a0a;border:1.5px solid ${C.red}" title="${h.name}">🏥</div>`,
        iconSize:[28,28], iconAnchor:[14,14], className:''
      })
    });
    m.bindPopup(`<div class="ph"><div class="ph-n">${h.name}</div><div class="ph-a">🏥 Primary Health Centre</div></div>`);
    m.on('click', e => L.DomEvent.stopPropagation(e));
    facGroup.addLayer(m);
  });
  _villageLayers.facilities = facGroup;
  villageLayer.addLayer(facGroup);

  // ── CONNECTION CABLE (if improved) ──
  if (improved) {
    _drawCable(stats);
  }
}

function _drawCable(stats) {
  if (_villageLayers.cable) villageLayer.removeLayer(_villageLayers.cable);
  const cable = L.polyline([stats.west.centroid, stats.east.centroid], {
    color: C.teal, weight: 3.5, opacity: 0.9,
    dashArray: '', lineCap: 'round', lineJoin: 'round',
    className: 'cable-anim'
  });
  cable.bindTooltip('⚡ Power Cable Connection — West → East', { sticky: true });
  _villageLayers.cable = cable;
  villageLayer.addLayer(cable);
}

function simulateElecImprovement() {

function resetElecSimulation() {

}

function plotDefault() {
  const h = applyFilters(allHouses);

function wardRiskTable(houses) {
  const byWard = {};
  houses.forEach(h => {
    const w = h.ward_no;
    if (!byWard[w]) byWard[w] = { count: 0, pop: 0, scoreSum: 0, critical: 0 };
    const s = riskScore(h);
    byWard[w].count++;
    byWard[w].pop += h.total_members;
    byWard[w].scoreSum += s;
    if (s > 60) byWard[w].critical++;
  });
  const rows = Object.entries(byWard)
    .sort((a, b) => (b[1].scoreSum / b[1].count) - (a[1].scoreSum / a[1].count))
    .map(([w, d]) => {
      const avg = Math.round(d.scoreSum / d.count);
      const c   = avg > 60 ? 'hr' : avg >= 30 ? '' : 'hg';
      const areaName = WARD_NAMES[w] || `Ward ${w}`;
      return `<tr>
        <td>${areaName}</td>
        <td class="n">${d.count}</td>
        <td class="n">${d.pop}</td>
        <td class="n ${c}">${avg}</td>
        <td class="n ${d.critical > 0 ? 'hr' : 'hg'}">${d.critical}</td>
      </tr>`;
    }).join('');
  return `<table class="wt"><thead><tr>
    <th>Ward</th><th>HH</th><th>Pop</th><th>Avg Risk</th><th>Critical</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

// ═══════════════════════════════════════════════════════════
// CESIUM 3D RENDERING
// ═══════════════════════════════════════════════════════════
// Default 3D color = risk score (red/amber/green)
function cesiumColor(h) {
  const s = riskScore(h);
  if (s > 60) return Cesium.Color.fromCssColorString('#e04848').withAlpha(0.92);
  if (s >= 30) return Cesium.Color.fromCssColorString('#e0a028').withAlpha(0.92);
  return Cesium.Color.fromCssColorString('#40c060').withAlpha(0.92);
}

function cesiumColorForQ(h) {
  if (!activeQ) return cesiumColor(h);
  switch(activeQ) {
    case 'no_toilet': return Cesium.Color.fromCssColorString(h.has_toilet ? C.green : C.red).withAlpha(0.85);
    case 'no_elec': return Cesium.Color.fromCssColorString(h.has_electricity ? C.green : C.red).withAlpha(0.85);
    case 'no_water': return Cesium.Color.fromCssColorString(h.has_water_supply ? C.teal : C.amber).withAlpha(0.85);
    case 'bpl_noscheme':
    case 'bpl_kuccha':
      if (h.bpl && h.house_type === 'Kuccha') return Cesium.Color.fromCssColorString(C.red).withAlpha(0.85);
      if (h.bpl) return Cesium.Color.fromCssColorString(C.orange).withAlpha(0.85);
      return Cesium.Color.fromCssColorString(C.gray).withAlpha(0.5);
    case 'no_drain': return Cesium.Color.fromCssColorString(h.has_drainage ? C.teal : C.orange).withAlpha(0.85);
    case 'no_gas': return Cesium.Color.fromCssColorString(h.has_gas ? C.green : C.orange).withAlpha(0.85);
    case 'waste':
      if (h.waste_mgmt === 'Open dumping') return Cesium.Color.fromCssColorString(C.red).withAlpha(0.85);
      if (h.waste_mgmt === 'Self-disposal') return Cesium.Color.fromCssColorString(C.orange).withAlpha(0.85);
      return Cesium.Color.fromCssColorString(C.green).withAlpha(0.85);
    case 'root_cause': {
      const rc = detectRootCauses(h);
      if (rc.some(c => c.priority === 'high')) return Cesium.Color.fromCssColorString(C.red).withAlpha(0.85);
      if (rc.length > 0) return Cesium.Color.fromCssColorString(C.orange).withAlpha(0.85);
      return Cesium.Color.fromCssColorString(C.green).withAlpha(0.85);
    }
    case 'pop_infra': {
      const sc = (h.has_toilet?1:0)+(h.has_electricity?1:0)+(h.has_water_supply?1:0);
      if (h.total_members >= 4 && sc <= 1) return Cesium.Color.fromCssColorString(C.red).withAlpha(0.85);
      if (h.total_members >= 4 && sc === 2) return Cesium.Color.fromCssColorString(C.yellow).withAlpha(0.85);
      return Cesium.Color.fromCssColorString(C.green).withAlpha(0.85);
    }
    default: return cesiumColor(h);
  }
}

// ── Seeded deterministic jitter so each house always offsets identically ──
// Uses a hash of the house ID to produce a stable pseudo-random in [-1, 1]
function seededRand(n) {
  const x = Math.sin(n * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x); // 0..1
}
function jitterCoord(house) {
  // ±15m scatter — breaks the seed-data diagonal without overlap at 7-11m building widths
  const jScale = 0.000135;
  return {
    lat: house.lat + (seededRand(house.id * 13 + 1) - 0.5) * 2 * jScale,
    lng: house.lng + (seededRand(house.id * 7  + 5) - 0.5) * 2 * jScale
  };
}

// ═══════════════════════════════════════════════════════════
// 3D BUILDING RENDERER
// Architecture: 3-layer stack  →  plinth · walls · roof
// Labels      : building name (close-up) + ward area (far view)
// Data viz    : roof colour encodes risk / query status
// Scale       : realistic Indian village single/double storey
// ═══════════════════════════════════════════════════════════
function renderCesium(houses) {
  if (!viewer) return;

  // Remove all entities EXCEPT permanent ones: hover-ring + geo location labels
  const PERMANENT = new Set(['__hover_ring', '__geo_city', '__geo_suburb']);
  viewer.entities.values
    .filter(e => !PERMANENT.has(e.id))
    .forEach(e => viewer.entities.remove(e));

  houseEntityMap.clear();
  if (_hoverRingEnt) _hoverRingEnt.show = false;
  _hoveredHouseId = null;

  // ── Shared palette ──
  const COL = {
    wall  : Cesium.Color.fromCssColorString('#e2ddd6'),
    wallOL: Cesium.Color.fromCssColorString('#6a6258').withAlpha(0.5),
    plinth: Cesium.Color.fromCssColorString('#c4b89e'),
    shadow: Cesium.Color.fromCssColorString('#000000').withAlpha(0.26)
  };

  // ══════════════════════════════════════════════
  // STEP 1a — Ward overview pillars
  // Visible from 600m – 9000m (far / overview altitude)
  // Acts as a "bar chart in 3D" so user instantly sees
  // ward locations + risk without needing to zoom in.
  // ══════════════════════════════════════════════
  const byWardPillar = {};
  houses.forEach(h => {
    const w = h.ward_no;
    if (!byWardPillar[w]) byWardPillar[w] = { pop:0, latSum:0, lngSum:0, n:0, scoreSum:0 };
    byWardPillar[w].pop       += h.total_members;
    byWardPillar[w].latSum    += h.lat;
    byWardPillar[w].lngSum    += h.lng;
    byWardPillar[w].n++;
    byWardPillar[w].scoreSum  += riskScore(h);
  });

  Object.entries(byWardPillar).forEach(([ward, d]) => {
    const cLat    = d.latSum / d.n;
    const cLng    = d.lngSum / d.n;
    const avgRisk = d.scoreSum / d.n;
    // Height: 80m base + population scale so denser wards are taller
    const pillarH = 80 + d.pop * 1.8;

    const col = avgRisk > 60
      ? Cesium.Color.fromCssColorString('#e04848')
      : avgRisk >= 30
      ? Cesium.Color.fromCssColorString('#e0a028')
      : Cesium.Color.fromCssColorString('#40c060');

    const wardLabel = WARD_NAMES[ward] || `Ward ${ward}`;

    // Pillar body — cone-like cylinder (wider base, narrow top)
    viewer.entities.add({
      id: `__pillar_${ward}`,
      position: Cesium.Cartesian3.fromDegrees(cLng, cLat, pillarH / 2),
      cylinder: {
        length:       pillarH,
        topRadius:    18,
        bottomRadius: 38,
        material:     col.withAlpha(0.80),
        outline:      true,
        outlineColor: col.brighten(0.25, new Cesium.Color()),
        outlineWidth: 2.0,
        distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 20000)
      }
    });

    // Glowing cap disc on top
    viewer.entities.add({
      id: `__pillar_${ward}_cap`,
      position: Cesium.Cartesian3.fromDegrees(cLng, cLat, pillarH + 4),
      ellipse: {
        semiMajorAxis: 28, semiMinorAxis: 28,
        material: col.withAlpha(0.45),
        height: pillarH + 4,
        distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 20000)
      }
    });

    // Label above pillar — area name + stats
    viewer.entities.add({
      id: `__pillar_${ward}_lbl`,
      position: Cesium.Cartesian3.fromDegrees(cLng, cLat, pillarH + 22),
      label: {
        text: `${wardLabel}\n${d.pop} people · ${d.n} HH`,
        font: 'bold 15px "DM Sans", sans-serif',
        fillColor: Cesium.Color.WHITE,
        outlineColor: Cesium.Color.fromCssColorString('#0a0e18'),
        outlineWidth: 3,
        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
        verticalOrigin:   Cesium.VerticalOrigin.BOTTOM,
        horizontalOrigin: Cesium.HorizontalOrigin.CENTER,
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
        distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 20000),
        showBackground:      true,
        backgroundColor:     Cesium.Color.fromCssColorString('#0a0e18').withAlpha(0.82),
        backgroundPadding:   new Cesium.Cartesian2(9, 6),
        pixelOffset:         new Cesium.Cartesian2(0, -6)
      }
    });
  });

  // ══════════════════════════════════════════════
  // STEP 1b — Individual 3D buildings
  // Visible only when camera < 700m (zoomed in)
  // ══════════════════════════════════════════════
  const BUILD_FAR = new Cesium.DistanceDisplayCondition(0, 700);

  houses.forEach(h => {
    const pos     = jitterCoord(h);
    const storeys = h.total_members <= 3 ? 1 : h.total_members <= 6 ? 2 : 3;
    const wallH   = storeys * 3.2;
    const plinthH = 0.4;
    const roofThk = 0.45;
    const fp      = Math.min(12, 7 + h.total_members * 0.5);
    const totalH  = plinthH + wallH;

    const plinthZ = plinthH / 2;
    const wallZ   = plinthH + wallH / 2;
    const roofZ   = plinthH + wallH + roofThk / 2;
    const labelZ  = plinthH + wallH + roofThk + 2.2;

    const roofCol   = cesiumColorForQ(h).withAlpha(0.96);
    const roofColOL = roofCol.darken(0.3, new Cesium.Color());

    // ── (A) Shadow pad ──
    const shadowEnt = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(pos.lng, pos.lat, 0.06),
      ellipse: {
        semiMajorAxis: fp * 0.68, semiMinorAxis: fp * 0.6,
        material: COL.shadow, height: 0.06,
        distanceDisplayCondition: BUILD_FAR
      }
    });
    shadowEnt._houseId = h.id;

    // ── (B) Plinth ──
    const plinthEnt = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(pos.lng, pos.lat, plinthZ),
      box: {
        dimensions: new Cesium.Cartesian3(fp + 0.6, fp + 0.6, plinthH),
        material: COL.plinth,
        outline: true, outlineColor: COL.wallOL,
        shadows: Cesium.ShadowMode.RECEIVE_ONLY,
        distanceDisplayCondition: BUILD_FAR
      }
    });
    plinthEnt._houseId = h.id;

    // ── (C) Walls ──
    const wallDim = new Cesium.Cartesian3(fp, fp, wallH);
    const wallEnt = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(pos.lng, pos.lat, wallZ),
      box: {
        dimensions: wallDim.clone(),
        material: COL.wall,
        outline: true, outlineColor: COL.wallOL, outlineWidth: 1.0,
        shadows: Cesium.ShadowMode.ENABLED,
        distanceDisplayCondition: BUILD_FAR
      }
    });
    wallEnt._houseId = h.id;

    // ── (D) Roof slab — risk / query colour ──
    const roofEnt = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(pos.lng, pos.lat, roofZ),
      box: {
        dimensions: new Cesium.Cartesian3(fp + 0.35, fp + 0.35, roofThk),
        material: roofCol,
        outline: true, outlineColor: roofColOL, outlineWidth: 1.0,
        shadows: Cesium.ShadowMode.CAST_ONLY,
        distanceDisplayCondition: BUILD_FAR
      }
    });
    roofEnt._houseId = h.id;

    // ── (E) Building name label — visible only very close ──
    const score = riskScore(h);
    const labelColor = score > 60
      ? Cesium.Color.fromCssColorString('#ff8888')
      : score >= 30
        ? Cesium.Color.fromCssColorString('#ffd080')
        : Cesium.Color.fromCssColorString('#88e8b0');

    const nameEnt = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(pos.lng, pos.lat, labelZ),
      label: {
        text: h.head_name.split(' ')[0] + '\n' + (WARD_NAMES[h.ward_no]||'W'+h.ward_no),
        font: '10px "JetBrains Mono", monospace',
        fillColor: labelColor,
        outlineColor: Cesium.Color.fromCssColorString('#060810'),
        outlineWidth: 2,
        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        horizontalOrigin: Cesium.HorizontalOrigin.CENTER,
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
        distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 160),
        showBackground: true,
        backgroundColor: Cesium.Color.fromCssColorString('#060810').withAlpha(0.72),
        backgroundPadding: new Cesium.Cartesian2(5, 3),
        scale: 0.85
      }
    });
    nameEnt._houseId = h.id;

    // ── Register in map for O(1) lookup ──
    houseEntityMap.set(h.id, {
      h,
      wall:      wallEnt,
      roof:      roofEnt,
      pos,
      wallDim:   wallDim.clone(),
      roofColor: roofCol.clone(),
      totalH,
      fp
    });
  });
}

// ═══════════════════════════════════════════════════════════
// QUESTION DISPATCH
// ═══════════════════════════════════════════════════════════
function pickQ(id) {
  activeQ = id;
  document.querySelectorAll('.q-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  const h = applyFilters(allHouses);

  switch(id) {
    case 'density': qDensity(h); break;
    case 'ward_pop': qWardPop(h); break;
    case 'no_toilet': qNoToilet(h); break;
    case 'no_elec': qNoElec(h); break;
    case 'no_water': qNoWater(h); break;
    case 'no_drain': qNoDrain(h); break;
    case 'waste': qWaste(h); break;
    case 'no_gas': qNoGas(h); break;
    case 'roads_infra': qRoadsInfra(h); break;
    case 'edu_health': qEduHealth(h); break;
    case 'root_cause': qRootCause(h); break;
    case 'bpl_noscheme': qBplNoScheme(h); break;
    case 'pmay_gap': qPmayGap(h); break;
    case 'bpl_kuccha': qBplKuccha(h); break;
    case 'pop_infra': qPopInfra(h); break;
    case 'slwm_route': qSlwmRoute(h); break;
    case 'elec_route': qElecRoute(h); break;
  }
  if (currentView === '3d') renderCesium(h);
}

// ═══════ QUESTION HANDLERS ═══════

function qDensity(h) {
  // Draw grid first so rectangles sit below markers/heatmap
  const gridCells = drawDensityGrid(h);
  drawProblemZones(h);
  plotLeaflet(h, x => riskHex(riskScore(x)), x => 4 + x.total_members * 2);
  addAmbientCircles(h);
  showLegend([
    {c:'#dc2626',l:'Critical (score > 60)'},
    {c:'#f97316',l:'Medium (30–60)'},
    {c:'#22c55e',l:'Developed (< 30)'},
    {c:'#3b82f6',l:'Grid density zones'}
  ]);

  const tp  = h.reduce((s, x) => s + x.total_members, 0);
  const wp  = wardAgg(h);
  const topCells = (gridCells || []).filter(c => c.count > 0).slice(0, 5);
  const maxCellPop = topCells[0]?.pop || 1;
  const critHH = h.filter(x => riskScore(x) > 60).length;

  const zoneRows = topCells.map((cell, i) => {
    const intens  = cell.pop / maxCellPop;
    const lvl     = intens > 0.65 ? 'HIGH' : intens > 0.35 ? 'MEDIUM' : 'LOW';
    const lvlCls  = intens > 0.65 ? 'crit' : intens > 0.35 ? 'med' : 'dev';
    const barCls  = intens > 0.65 ? 'red'  : intens > 0.35 ? 'amb'  : 'grn';
    return `<div class="ri" style="cursor:pointer"
        onclick="showGridZoneInsight(_gridCellsCache[${i}],${i+1},${intens.toFixed(3)},_gridCellsCache)">
      <div class="ri-bar ${barCls}"></div>
      <div class="ri-c">
        <div class="ri-l">Zone ${cell.label} — ${cell.pop} people · ${cell.count} HH</div>
        <div class="ri-v">
          <span class="risk-badge ${lvlCls}">${lvl}</span>
          ${cell.noToilet||cell.noWater||cell.noElec
            ? `<span style="font-size:9px;color:var(--text-secondary);margin-left:6px">
                ${[cell.noToilet&&'toilet',cell.noWater&&'water',cell.noElec&&'elec'].filter(Boolean).join(' · ')} gaps</span>`
            : '<span style="font-size:9px;color:#40c060;margin-left:6px">✓ infra OK</span>'}
        </div>
      </div>
    </div>`;
  }).join('');

  setDashInsight('Population Density Analysis', `
    <div class="sg">
      <div class="sc"><div class="lb">Total Pop</div><div class="vl tl">${tp}</div></div>
      <div class="sc"><div class="lb">Households</div><div class="vl">${h.length}</div></div>
      <div class="sc"><div class="lb">Avg/House</div><div class="vl amb">${h.length?(tp/h.length).toFixed(1):0}</div></div>
      <div class="sc"><div class="lb">Critical HH</div><div class="vl ${critHH>0?'red':'grn'}">${critHH}</div></div>
    </div>
    <div class="st">Top Dense Areas</div>
    <div class="rl">${zoneRows || '<div class="ri"><div class="ri-c"><div class="ri-l">No data</div></div></div>'}</div>
    <div class="st">Ward Breakdown</div>${wardPopTable(wp)}
  `);
}

function qWardPop(h) {
  const wp = wardAgg(h);
  const mx = Math.max(...Object.values(wp).map(w=>w.pop));
  plotLeaflet(h, x => { const r=(wp[x.ward_no]?.pop||0)/mx; return r>.7?C.red:r>.4?C.amber:C.green; });
  showLegend([{c:C.red,l:'Highest pop ward'},{c:C.amber,l:'Medium'},{c:C.green,l:'Lowest'}]);
  setDashInsight('Ward Population Ranking', `
    <div class="sg">
      <div class="sc"><div class="lb">Total Pop</div><div class="vl tl">${h.reduce((s,x)=>s+x.total_members,0)}</div></div>
      <div class="sc"><div class="lb">Wards</div><div class="vl">${Object.keys(wp).length}</div></div>
    </div>
    <div class="st">Population by Ward</div>
    ${barChart(Object.entries(wp).sort((a,b)=>b[1].pop-a[1].pop).map(([w,d])=>({l:'Ward '+w,v:d.pop,mx,cl:d.pop/mx>.7?'red':d.pop/mx>.4?'amb':'grn'})))}

  `);
}

function qPopInfra(h) {
  const crit = h.filter(x => {

    return x.total_members >= 4 && sc <= 1;
  });
  const partial = h.filter(x => {
    const sc = (x.has_toilet?1:0)+(x.has_electricity?1:0)+(x.has_water_supply?1:0);
    return x.total_members >= 4 && sc === 2;
  });

  drawProblemZones(h);
  plotLeaflet(h, x => {
    const sc = (x.has_toilet?1:0)+(x.has_electricity?1:0)+(x.has_water_supply?1:0);

    if (x.total_members>=4 && sc===2) return '#b09030';

function qRootCause(h) {
  const causes = aggregateRootCauses(h);
  const highPriority = causes.filter(c => c.priority === 'high');
  const medPriority  = causes.filter(c => c.priority === 'medium');

  drawProblemZones(h);
  plotLeaflet(h, x => {
    const rc = detectRootCauses(x);
    if (rc.some(c => c.priority === 'high')) return C.red;
    if (rc.length > 0) return C.orange;
    return C.green;
  }, x => {
    const rc = detectRootCauses(x);
    return 5 + rc.length * 3 + x.total_members;
  });
  showLegend([{c:C.red,l:'High-priority gaps'},{c:C.orange,l:'Medium-priority'},{c:C.green,l:'No issues'}]);

  const causeRows = causes.slice(0, 10).map(c => `
    <div class="ri" style="cursor:pointer">
      <div class="ri-bar ${c.priority==='high'?'red':'amb'}"></div>
      <div class="ri-c">
        <div class="ri-l">${c.issue}: ${c.cause}</div>
        <div class="ri-v">${c.count} HH · ${c.affected_pop} people — <strong>${c.solution}</strong></div>
      </div>
    </div>`).join('');

  const schemeSummary = {};
  causes.forEach(c => {
    if (!schemeSummary[c.scheme]) schemeSummary[c.scheme] = { count: 0, pop: 0 };
    schemeSummary[c.scheme].count += c.count;
    schemeSummary[c.scheme].pop += c.affected_pop;
  });

  const schemeRows = Object.entries(schemeSummary)
    .sort((a, b) => b[1].count - a[1].count)
    .map(([scheme, d]) => `
      <div class="ri"><div class="ri-bar grn"></div>
        <div class="ri-c"><div class="ri-l">${scheme}</div>
        <div class="ri-v">${d.count} HH · ${d.pop} people eligible</div></div></div>`).join('');

  setDashInsight('Root Cause Analysis & Solutions', `
    <div class="sg">
      <div class="sc"><div class="lb">Total Issues</div><div class="vl red">${causes.reduce((s,c)=>s+c.count,0)}</div></div>
      <div class="sc"><div class="lb">High Priority</div><div class="vl red">${highPriority.length}</div></div>
      <div class="sc"><div class="lb">Medium</div><div class="vl amb">${medPriority.length}</div></div>
      <div class="sc"><div class="lb">Schemes</div><div class="vl grn">${Object.keys(schemeSummary).length}</div></div>
    </div>
    <div class="st">Why Infrastructure Is Missing</div>
    <div class="rl">${causeRows}</div>
    <div class="st">Applicable Government Schemes</div>
    <div class="rl">${schemeRows}</div>
  `);
}

  // ── Draw pipe route polyline (toilet B → biogas → SLWM site) ──
  const pipeCoords = ['toilet_B','pipe_jn1','pipe_jn2','biogas_unit'].map(k => [S.nodes[k].lat, S.nodes[k].lng]);
  const drainCoords = ['biogas_unit','drain_jn1','drain_jn2','drain_jn3','slwm_site'].map(k => [S.nodes[k].lat, S.nodes[k].lng]);
  const pipeFromA = [[S.nodes.toilet_A_out.lat, S.nodes.toilet_A_out.lng],[S.nodes.biogas_unit.lat, S.nodes.biogas_unit.lng]];

  // Pipe B→Biogas (blue dashed)
  L.polyline(pipeCoords, { color:'#38bdf8', weight:4, dashArray:'8,6', opacity:0.9 })
    .bindPopup('<b>4" PVC Closed Pipe</b><br>House B toilet → Biogas unit (65m)')
    .addTo(zoneLayer);
  // Pipe A→Biogas (cyan dashed)
  L.polyline(pipeFromA, { color:'#06b6d4', weight:3, dashArray:'6,8', opacity:0.7 })
    .bindPopup('<b>4" PVC (retrofit)</b><br>House A greywater → Biogas (replaces open drain)')
    .addTo(zoneLayer);
  // Drain Biogas→SLWM (green solid)
  L.polyline(drainCoords, { color:'#22c55e', weight:5, opacity:0.85 })
    .bindPopup('<b>6" RCC Covered Drain</b><br>Treated effluent → Village SLWM site (180m)')
    .addTo(zoneLayer);

  // ── Key node markers ──
  const nodeStyles = {
    toilet:  { color:'#38bdf8', icon:'🚽', r:10 },
    biogas:  { color:'#a855f7', icon:'⚡',  r:12 },
    slwm:    { color:'#22c55e', icon:'♻️',  r:14 },
    pipe_jn: { color:'#64748b', icon:'●',  r:4  },
    drain_jn:{ color:'#22c55e', icon:'●',  r:4  }
  };
  Object.entries(S.nodes).forEach(([key, nd]) => {
    const st = nodeStyles[nd.type] || nodeStyles.pipe_jn;
    if (nd.type === 'pipe_jn' || nd.type === 'drain_jn') {

      mk.bindPopup(`<b>${nd.label}</b>`);
      mk.addTo(zoneLayer);
    }
  });

  // House A marker
  L.marker([S.houseA.lat, S.houseA.lng], {
    icon: L.divIcon({ className:'', html:'<div style="background:#22c55e;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:bold;border:2px solid #fff;box-shadow:0 0 6px #22c55e80">A</div>', iconSize:[22,22], iconAnchor:[11,11] })

  // House B marker
  L.marker([S.houseB.lat, S.houseB.lng], {
    icon: L.divIcon({ className:'', html:'<div style="background:#ef4444;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:bold;border:2px solid #fff;box-shadow:0 0 6px #ef444480">B</div>', iconSize:[22,22], iconAnchor:[11,11] })
  }).bindPopup(`<b>House B — ${S.houseB.head}</b><br>BPL · Semi-Pucca · ${S.houseB.members} members<br>❌ No toilet<br><small>${S.houseB.rootCause}</small>`).addTo(zoneLayer);

  // Community toilet marker

  lmap.fitBounds(L.latLngBounds(allPts).pad(0.15), { animate:true, duration:0.6 });

  showLegend([
    {c:'#ef4444',l:'House B (no toilet)'},
    {c:'#22c55e',l:'House A (SBM toilet)'},
    {c:'#38bdf8',l:'Proposed 4" PVC pipe'},
    {c:'#a855f7',l:'Shared biogas unit'},
    {c:'#22c55e',l:'Covered drain → SLWM'}
  ]);

  // ── Right panel ──
  const stepRows = S.proposal.steps.map(s => `
    <div class="ri"><div class="ri-bar ${s.step<=2?'red':s.step<=3?'amb':'grn'}"></div>
      <div class="ri-c"><div class="ri-l">Step ${s.step}: ${s.action}</div>
      <div class="ri-v">${s.timeline} · ₹${(s.cost/1000).toFixed(0)}K</div></div></div>`).join('');

  setDashInsight('SLWM — Sanitation & Waste Routing', `
    <div class="sg">
      <div class="sc"><div class="lb">Total Cost</div><div class="vl amb">₹${(S.proposal.estimatedCost/1000).toFixed(0)}K</div></div>
      <div class="sc"><div class="lb">Timeline</div><div class="vl">${S.proposal.timeline_months} mo</div></div>
      <div class="sc"><div class="lb">Scheme</div><div class="vl grn">SBM-II</div></div>
      <div class="sc"><div class="lb">HH Benefit</div><div class="vl">2</div></div>
    </div>

    <div class="st">House A — ${S.houseA.head} (APL, Pucca)</div>
    <div class="rl"><div class="ri"><div class="ri-bar grn"></div><div class="ri-c">
      <div class="ri-l">✅ Has SBM twin-pit toilet (ID: ${S.houseA.sbm_id})</div>
      <div class="ri-v">${S.houseA.wasteSystem}</div></div></div></div>

    <div class="st">House B — ${S.houseB.head} (BPL, Semi-Pucca)</div>
    <div class="rl"><div class="ri"><div class="ri-bar red"></div><div class="ri-c">
      <div class="ri-l">❌ No toilet — Root Cause:</div>
      <div class="ri-v">${S.houseB.rootCause}</div></div></div>
    <div class="ri"><div class="ri-bar amb"></div><div class="ri-c">
      <div class="ri-l">Current practice:</div>
      <div class="ri-v">${S.houseB.currentPractice}</div></div></div></div>

    <div class="st">Proposed SLWM Plan (${S.proposal.timeline_months} months)</div>
    <div class="rl">${stepRows}</div>

    <div class="st">Physical Route — Pipe Network</div>
    <div class="rl">
      ${S.connections.map(c => `<div class="ri"><div class="ri-bar" style="background:#38bdf8"></div><div class="ri-c">
        <div class="ri-l">${S.nodes[c.from]?.label || c.from} → ${S.nodes[c.to]?.label || c.to}</div>
        <div class="ri-v">${c.pipe} · ${c.length_m}m${c.note ? ' · '+c.note : ''}</div></div></div>`).join('')}
    </div>
  `);
}

function qElecRoute(h) {
  const E = ELECTRICITY_PLAN;
  clearLeaflet();

  // ── Plot all houses colored by zone ──
  h.forEach(house => {
    const inZ1 = [1,2,3].includes(house.ward_no);
    const color = inZ1
      ? (house.has_electricity ? '#22c55e' : '#eab308')
      : (house.has_electricity ? '#f97316' : '#ef4444');
    const pos = jitterCoord(house);
    const m = L.marker([pos.lat, pos.lng], { icon: circleIcon(color, 6) });
    m.bindPopup(popup(house), { maxWidth: 300 });
    m.on('click', (e) => { L.DomEvent.stopPropagation(e); showHouseholdInsight(house); });
    cluster.addLayer(m);
  });

  // ── Pole markers + conductor line ──
  const poleMap = {};
  E.poles.forEach(p => { poleMap[p.id] = p; });

  // Conductor polyline (full route)
  const routeCoords = E.poles.map(p => [p.lat, p.lng]);
  L.polyline(routeCoords, { color:'#f59e0b', weight:3, opacity:0.9, dashArray:'10,5' })
    .bindPopup('<b>Proposed 11kV Line</b><br>DT-1 → DT-2 (17 poles, 2.2km)')
    .addTo(zoneLayer);

  // Individual pole markers
  E.poles.forEach(p => {
    const isTransformer = p.type === 'transformer';
    const isRiver = p.type === 'river_pole';
    const color = isTransformer ? '#a855f7' : isRiver ? '#ef4444' : '#f59e0b';
    const size = isTransformer ? 16 : isRiver ? 10 : 6;
    const icon = isTransformer ? '⚡' : isRiver ? '🔴' : '';

    if (isTransformer || isRiver) {
      L.marker([p.lat, p.lng], {
        icon: L.divIcon({
          className:'',
          html:`<div style="background:${color};width:${size*2}px;height:${size*2}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${size-2}px;box-shadow:0 0 10px ${color}80;border:2px solid #fff;color:#fff;font-weight:bold">${icon}</div>`,
          iconSize:[size*2,size*2], iconAnchor:[size,size]
        })
      }).bindPopup(`<b>${p.label}</b><br>${p.material}${p.note ? '<br><em>'+p.note+'</em>' : ''}`).addTo(zoneLayer);
    } else {
      L.circleMarker([p.lat, p.lng], { radius:size, color, fillColor:color, fillOpacity:0.8, weight:2 })
        .bindPopup(`<b>${p.label}</b><br>${p.material}`).addTo(zoneLayer);
    }
  });

  // ── Nallah obstacle line ──
  L.polyline(
    [[E.nallah.lat1, E.nallah.lng1],[E.nallah.lat2, E.nallah.lng2]],
    { color:'#3b82f6', weight:8, opacity:0.35, dashArray:'2,6' }
  ).bindPopup(`<b>${E.nallah.label}</b><br>Width: ${E.nallah.width_m}m`).addTo(zoneLayer);
  // Nallah label
  const nMid = [(E.nallah.lat1+E.nallah.lat2)/2, (E.nallah.lng1+E.nallah.lng2)/2];
  L.marker(nMid, {
    icon: L.divIcon({ className:'', html:'<div style="background:#3b82f680;color:#fff;padding:2px 8px;border-radius:8px;font-size:10px;white-space:nowrap;font-weight:600">🌊 Nallah (15m)</div>', iconSize:[100,20], iconAnchor:[50,10] })
  }).addTo(zoneLabelLayer);

  // ── Zone boundary circles ──
  L.circle([E.zone1.transformer.lat, E.zone1.transformer.lng], { radius: 2200, color:'#22c55e', fillColor:'#22c55e', fillOpacity:0.04, weight:1.5, dashArray:'8,4' })
    .bindPopup(`<b>Zone 1 — Main Village</b><br>${E.zone1.hh_electrified}/${E.zone1.hh_total} HH electrified`).addTo(zoneLayer);
  L.circle([18.4780, 73.7920], { radius: 1800, color:'#ef4444', fillColor:'#ef4444', fillOpacity:0.04, weight:1.5, dashArray:'8,4' })
    .bindPopup(`<b>Zone 2 — New Settlement</b><br>${E.zone2.hh_electrified}/${E.zone2.hh_total} HH electrified<br><small>${E.zone2.rootCause}</small>`).addTo(zoneLayer);

  // Fit bounds to full pole route + houses
  const allPts = E.poles.map(p=>[p.lat,p.lng]).concat(h.map(x=>[x.lat,x.lng]));
  lmap.fitBounds(L.latLngBounds(allPts).pad(0.08), { animate:true, duration:0.6 });

  showLegend([
    {c:'#22c55e',l:'Zone 1 — Electrified'},
    {c:'#eab308',l:'Zone 1 — No connection'},
    {c:'#f97316',l:'Zone 2 — Illegal hookup'},
    {c:'#ef4444',l:'Zone 2 — No electricity'},
    {c:'#f59e0b',l:'Proposed 11kV pole route'},
    {c:'#a855f7',l:'Transformers (DT-1/DT-2)'},
    {c:'#3b82f6',l:'Nallah obstacle'}
  ]);

  // ── Right panel ──
  const stepRows = E.proposal.steps.map(s => `
    <div class="ri"><div class="ri-bar ${s.step<=2?'amb':s.step<=4?'red':'grn'}"></div>
      <div class="ri-c"><div class="ri-l">Step ${s.step}: ${s.action}</div>
      <div class="ri-v">${s.timeline} · ₹${(s.cost/1000).toFixed(0)}K</div></div></div>`).join('');

  const conductorRows = E.conductors.map(c => `
    <div class="ri"><div class="ri-bar" style="background:#f59e0b"></div>
      <div class="ri-c"><div class="ri-l">${poleMap[c.from]?.label||c.from} → ${poleMap[c.to]?.label||c.to}</div>
      <div class="ri-v">${c.conductor} · ${c.span_m}m${c.note ? ' · '+c.note : ''}</div></div></div>`).join('');

  setDashInsight('Grid Expansion — Zone 1 → Zone 2', `
    <div class="sg">
      <div class="sc"><div class="lb">Total Cost</div><div class="vl amb">₹${(E.proposal.estimatedCost/100000).toFixed(1)}L</div></div>
      <div class="sc"><div class="lb">Timeline</div><div class="vl">${E.proposal.timeline_months} mo</div></div>
      <div class="sc"><div class="lb">Poles</div><div class="vl">${E.poles.filter(p=>p.type!=='transformer').length}</div></div>
      <div class="sc"><div class="lb">HH Benefit</div><div class="vl grn">${E.zone2.hh_total}</div></div>
    </div>

    <div class="st">Zone 1 — Main Village (Wards 1-3)</div>
    <div class="rl"><div class="ri"><div class="ri-bar grn"></div><div class="ri-c">
      <div class="ri-l">${E.zone1.hh_electrified}/${E.zone1.hh_total} HH electrified (${Math.round(E.zone1.hh_electrified/E.zone1.hh_total*100)}%)</div>
      <div class="ri-v">${E.zone1.description}</div></div></div></div>

    <div class="st">Zone 2 — New Settlement (Wards 4-5)</div>
    <div class="rl"><div class="ri"><div class="ri-bar red"></div><div class="ri-c">
      <div class="ri-l">${E.zone2.hh_electrified}/${E.zone2.hh_total} HH electrified (${Math.round(E.zone2.hh_electrified/E.zone2.hh_total*100)}%)</div>
      <div class="ri-v">${E.zone2.description}</div></div></div>
    <div class="ri"><div class="ri-bar red"></div><div class="ri-c">
      <div class="ri-l">Root Cause — Why Zone 2 Lacks Power</div>
      <div class="ri-v">${E.zone2.rootCause}</div></div></div></div>

    <div class="st">Proposed Plan (${E.proposal.timeline_months} months)</div>
    <div class="rl">${stepRows}</div>

    <div class="st">Pole Route — ${E.poles.length} nodes, ${E.conductors.length} spans</div>
    <div class="rl">${conductorRows}</div>

    <div class="st">Obstacles</div>
    <div class="rl">
      <div class="ri"><div class="ri-bar" style="background:#3b82f6"></div><div class="ri-c">
        <div class="ri-l">🌊 Seasonal Nallah (${E.nallah.width_m}m wide)</div>
        <div class="ri-v">Requires 2 × 12m steel poles with 45m clearance span. Monsoon depth 3m — standard PSC poles cannot be used.</div></div></div>
      <div class="ri"><div class="ri-bar amb"></div><div class="ri-c">
        <div class="ri-l">🌾 Paddy fields (200m stretch)</div>
        <div class="ri-v">GP easement required for pole foundations on agricultural land. Compensation ₹15,000/pole for 4 affected landholders.</div></div></div>
    </div>
  `);
}

// ═══════════════════════════════════════════════════════════
// PANEL STATE MANAGEMENT
// ═══════════════════════════════════════════════════════════
let _lastDashState = null;   // { t, html } — last dashboard/query view
let _inDetail      = false;  // whether right panel is showing a detail item
let _fromPillar    = false;  // whether detail view was opened via a 3D pillar click

// Hide all __pillar_* Cesium entities (called on pillar click, before blocks appear)
function _hidePillars() {
  if (typeof viewer === 'undefined') return;
  viewer.entities.values.forEach(e => {
    if (e.id && typeof e.id === 'string' && e.id.startsWith('__pillar_')) e.show = false;
  });
}

// Restore all __pillar_* Cesium entities (called on Back button from pillar detail)
function _showPillars() {
  if (typeof viewer === 'undefined') return;
  viewer.entities.values.forEach(e => {
    if (e.id && typeof e.id === 'string' && e.id.startsWith('__pillar_')) e.show = true;
  });
}

// Core setter — animates content swap + block enter animation
function setInsight(t, html) {
  const body  = document.getElementById('insight-body');
  const title = document.getElementById('insight-title');
  body.classList.add('fading');
  setTimeout(() => {
    title.textContent = t;
    body.innerHTML    = html;
    // Mark data blocks as entering so they start invisible
    body.querySelectorAll('.sc, .ri').forEach(el => el.classList.add('entering'));
    body.classList.remove('fading');
    // Small delay so browser paints entering state before transition kicks in
    setTimeout(() => {
      body.querySelectorAll('.sc.entering, .ri.entering').forEach(el => el.classList.remove('entering'));
    }, 16);
  }, 130);
}

// Dashboard/query views — save as "home" state, hide back button
function setDashInsight(t, html) {
  _inDetail      = false;
  _lastDashState = { t, html };
  _hideBackRow();
  setInsight(t, html);
}

// Detail views (household / zone / pillar) — show back button + breadcrumb
function setDetailInsight(t, html, crumbLabel) {
  _inDetail = true;
  _showBackRow(crumbLabel || t);
  setInsight(t, html);
}

function _showBackRow(label) {
  const row   = document.getElementById('back-row');
  const crumb = document.getElementById('panel-crumb');
  crumb.innerHTML = `
    <span class="crumb-home">Home</span>
    <span class="crumb-sep">›</span>
    <span class="crumb-active">${label}</span>`;
  row.style.display = 'flex';
}

function _hideBackRow() {
  document.getElementById('back-row').style.display = 'none';
}

// Go back to last dashboard state (or Village Overview as fallback)
function goBack() {
  _inDetail = false;
  _hideBackRow();
  // If we came from a pillar click, restore the 3D pillars
  if (_fromPillar) {
    _fromPillar = false;
    _showPillars();
  }
  if (_lastDashState) {
    setInsight(_lastDashState.t, _lastDashState.html);
  } else {
    showVillageOverview(applyFilters(allHouses));
  }
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════

function wardAgg(h) {
  const m = {};
  h.forEach(x => { if(!m[x.ward_no]) m[x.ward_no]={count:0,pop:0}; m[x.ward_no].count++; m[x.ward_no].pop+=x.total_members; });
  return m;
}
function wardCount(arr) {
  const m = {};
  arr.forEach(x => { m[x.ward_no] = (m[x.ward_no]||0)+1; });
  return m;
}

function wardPopTable(wp) {
  const s = Object.entries(wp).sort((a,b)=>b[1].pop-a[1].pop);
  return `<table class="wt"><thead><tr><th>Ward</th><th>HH</th><th>Pop</th><th>Avg</th></tr></thead><tbody>
    ${s.map(([w,d])=>`<tr><td>${WARD_NAMES[w]||'Ward '+w}</td><td class="n">${d.count}</td><td class="n ${d.pop>40?'hr':''}">${d.pop}</td><td class="n">${(d.pop/d.count).toFixed(1)}</td></tr>`).join('')}
  </tbody></table>`;
}

function barChart(items) {
  if (!items||!items.length) return '<div style="color:var(--text-muted);font-size:11px;">No data</div>';
  return `<div class="bc">${items.map(i=>`<div class="br"><div class="bl">${i.l}</div><div class="bt"><div class="bf ${i.cl}" style="width:${i.mx?(i.v/i.mx*100):0}%"></div></div><div class="bv">${i.v}</div></div>`).join('')}</div>`;
}
